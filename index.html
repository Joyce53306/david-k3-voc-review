<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Big Class Voc Review</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        * { font-family: 'Comic Sans MS', 'Comic Sans', cursive !important; box-sizing: border-box; }
        body { background: #fffbe6; text-align: center; padding: 20px; }
        
        #start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .main-title { font-size: 3.5rem; color: #0284c7; margin-bottom: 20px; }
        .start-btn { padding: 25px 50px; font-size: 2.5rem; background: #feca57; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        
        #lesson-menu, #game-area { display: none; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 500px; margin: 20px auto; }
        .lesson-btn { padding: 25px; background: #fff; border: 4px solid #7dd3fc; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 1.8rem; }
        
        #current-lesson { font-size: 4rem; color: #0284c7; margin: 10px 0; }
        .drop-zone { width: 90%; height: 140px; border: 6px dashed #f59e0b; margin: 20px auto; display: flex; align-items: center; justify-content: center; border-radius: 25px; background: #fffbeb; font-size: 1.5rem; }
        
        .word-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; max-width: 500px; margin: 20px auto; }
        .word-item { padding: 30px 10px; background: #fff; border: 5px solid #ccc; border-radius: 20px; cursor: grab; font-size: 2.2rem; font-weight: bold; }
        
        #feedback-msg { font-size: 2.2rem; font-weight: bold; margin: 20px; min-height: 60px; color: #ea580c; }
    </style>
</head>
<body>
    <div id="start-screen">
        <div style="display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 10px;">
            <svg width="70" height="100" viewBox="0 0 70 100">
                <ellipse cx="35" cy="38" rx="32" ry="36" fill="#0284c7"/>
                <ellipse cx="24" cy="26" rx="9" ry="12" fill="#7dd3fc" opacity="0.6"/>
                <polygon points="28,72 42,72 35,84" fill="#0284c7"/>
                <line x1="35" y1="84" x2="35" y2="100" stroke="#94a3b8" stroke-width="2"/>
            </svg>
            <h1 class="main-title" style="margin: 0;">Big Class</h1>
            <svg width="70" height="100" viewBox="0 0 70 100">
                <ellipse cx="35" cy="38" rx="32" ry="36" fill="#feca57"/>
                <ellipse cx="24" cy="26" rx="9" ry="12" fill="#fff3c4" opacity="0.7"/>
                <polygon points="28,72 42,72 35,84" fill="#feca57"/>
                <line x1="35" y1="84" x2="35" y2="100" stroke="#94a3b8" stroke-width="2"/>
            </svg>
        </div>
        <button class="start-btn" onclick="showMenu()">Tap to start! ▶</button>
    </div>
    <div id="lesson-menu">
        <h1>Big Class Voc Review</h1>
        <div class="menu-grid" id="menu-grid"></div>
    </div>
    <div id="game-area">
        <h2 id="current-lesson"></h2>
        <button onclick="playTarget()" style="font-size: 2.5rem; padding: 20px 50px; border-radius: 25px; background: #a7f3d0; border: none; cursor: pointer;">🔊 Listen</button>
        <div class="drop-zone" id="drop-zone">Drag the word here!</div>
        <div id="feedback-msg"></div>
        <div class="word-container" id="word-container"></div>
        <button id="home-btn" onclick="location.reload()" style="display:none; padding:20px 40px; border-radius:25px; font-size:2rem; background:#fbbf24; border:none; margin-top:30px;">🏠 Back Home</button>
    </div>
<script>
    function playVictoryFanfare() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();

        function stab(freq, startTime, dur, type, gainVal) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            const endTime = startTime + dur;
            gain.gain.setValueAtTime(gainVal, startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, endTime);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(startTime);
            osc.stop(endTime);
        }

        const t0 = ctx.currentTime;

        const runUp = [392.00, 493.88, 587.33, 783.99];
        runUp.forEach((f, i) => {
            stab(f, t0 + i * 0.08, 0.09, 'sawtooth', 0.14);
        });

        const stabChord1 = [587.33, 739.99, 932.33];
        stabChord1.forEach(f => stab(f, t0 + 0.32, 0.18, 'sawtooth', 0.13));

        const stabChord2 = [659.25, 830.61, 1046.50];
        stabChord2.forEach(f => stab(f, t0 + 0.52, 0.18, 'sawtooth', 0.13));

        const finalChord = [523.25, 659.25, 783.99, 1046.50, 1318.51];
        finalChord.forEach(f => stab(f, t0 + 0.74, 0.8, 'sawtooth', 0.11));
        finalChord.forEach(f => stab(f / 2, t0 + 0.74, 0.8, 'square', 0.09));

        const bufferSize = ctx.sampleRate * 0.3;
        const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            output[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        const noise = ctx.createBufferSource();
        noise.buffer = noiseBuffer;
        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0.2, t0 + 0.74);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, t0 + 1.0);
        noise.connect(noiseGain);
        noiseGain.connect(ctx.destination);
        noise.start(t0 + 0.74);
    }
<script>
    const victoryAudio = new Audio('https://www.myinstants.com/media/sounds/final-fantasy-vii-victory-fanfare-1.mp3');
    const data = {
        "L 1": ["chef", "teacher", "ballerina", "doctor", "pilot", "vet", "nurse"],
        "L 2": ["hit", "kick", "throw", "catch", "spike", "ball"],
        "L 3": ["take a bath", "comb hair", "brush teeth", "wash hands", "eat broccoli", "drink water"],
        "L 4": ["hungry", "polite", "rice", "soup", "dinosaur"],
        "L 5": ["windy", "rainy", "sunny", "snowy", "stormy", "cold", "hot"],
        "L 6": ["hippo", "giraffe", "kangaroo", "elephant", "monkey"],
        "L 7": ["cut with scissors", "color with markers", "paste with glue", "draw with crayons", "paint with watercolor"],
        "L 8": ["Christmas", "Easter", "Chinese New Year", "Thanksgiving", "Valentine's Day", "Halloween"],
        "L 9": ["popsicle", "bag", "shoes", "hat", "buy"],
        "L 10": ["garden", "lollipop", "puppy", "turtle", "flower"]
    };
    let remainingWords = []; let targetWord = "";
    function showMenu() {
        window.speechSynthesis.cancel();
        let unlock = new SpeechSynthesisUtterance(' ');
        unlock.volume = 0;
        window.speechSynthesis.speak(unlock);

        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            gain.gain.value = 0;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.01);
        } catch (e) {}

        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('lesson-menu').style.display = 'block';
    }
    function startLesson(lesson) {
        document.getElementById('lesson-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('current-lesson').innerText = lesson;
        remainingWords = [...data[lesson]];
        nextWord();
    }
    Object.keys(data).forEach(l => {
        const btn = document.createElement('button');
        btn.className = 'lesson-btn'; btn.innerText = l;
        btn.onclick = () => startLesson(l);
        document.getElementById('menu-grid').appendChild(btn);
    });
    function nextWord() {
        if (remainingWords.length === 0) {
            document.getElementById('feedback-msg').innerText = "Amazing! You finished the lesson! 🎉";
            playVictoryFanfare();
            confetti({ particleCount: 300, spread: 160, origin: { y: 0.6 } });
            document.getElementById('home-btn').style.display = 'inline-block';
            return;
        }
        targetWord = remainingWords[Math.floor(Math.random() * remainingWords.length)];
        const container = document.getElementById('word-container');
        container.innerHTML = '';
        data[Object.keys(data).find(k => data[k].includes(targetWord))].forEach(word => {
            const div = document.createElement('div');
            div.className = 'word-item'; div.innerText = word;
            container.appendChild(div);
        });
        new Sortable(container, { group: 'shared', animation: 150 });
        playTarget();
    }
    new Sortable(document.getElementById('drop-zone'), {
        group: 'shared',
        onAdd: function (evt) {
            if (evt.item.innerText === targetWord) {
                document.getElementById('feedback-msg').innerText = "Good job! Keep going!";
                remainingWords = remainingWords.filter(w => w !== targetWord);
                evt.item.remove();
                nextWord();
            } else {
                document.getElementById('feedback-msg').innerText = "Try again! 🙈";
                setTimeout(() => document.getElementById('word-container').appendChild(evt.item), 500);
            }
        }
    });
    function playTarget() {
        const msg = new SpeechSynthesisUtterance(targetWord);
        msg.lang = 'en-US'; msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }
</script>
</body>
</html>
